
name: Deploy Promethea to IPFS

on:
  push:
    branches:
      - main # This workflow runs automatically when you push to the main branch
  workflow_dispatch: # This allows you to run it manually from the GitHub Actions tab

jobs:
  deploy_ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using Node.js version 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Static Export (npm run export)
        run: npm run export
        env:
          NEXT_STATIC_EXPORT: true # Explicitly set the environment variable

      - name: Upload and Pin to IPFS via Pinata
        id: deploy_pinata
        uses: anantaramdas/ipfs-pinata-deploy-action@v1.6.4
        with:
          pinata-jwt: ${{ secrets.PINATA_JWT }}
          pin-name: "Promethea-dweb-${{ github.sha }}"
          path-to-deploy: 'out' # This is the folder generated by 'npm run export'
          
      - name: Update DNSLink TXT Record on Cloudflare
        uses: jerritecs/cloudflare-dnslink-action@v1.0.2
        with:
          cloudflare_zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          cloudflare_token: ${{ secrets.CLOUDFLARE_JWT }}
          record_name: 'dweb.lvhllc.org'
          ipfs_hash: ${{ steps.deploy_pinata.outputs.ipfs_hash }}
          
      - name: Report Success
        run: |
          echo "🎉 IPFS Deployment Complete!"
          echo "🌐 Universal Gateway Link (recommended): https://dweb-lvhllc-org.cf-ipfs.com"
          echo "🔗 Direct IPFS Gateway Link: https://ipfs.io/ipfs/${{ steps.deploy_pinata.outputs.ipfs_hash }}"
          echo "💡 Your dweb.lvhllc.org address was updated and may take a few minutes to resolve on IPFS-native browsers."

