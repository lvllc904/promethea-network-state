
name: Deploy Promethea to IPFS

on:
  push:
    branches:
      - main # This workflow runs automatically when you push to the main branch
  workflow_dispatch: # This allows you to run it manually from the GitHub Actions tab

jobs:
  deploy_ipfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using Node.js version 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Static Export (npm run export)
        run: npm run export
        env:
          NEXT_STATIC_EXPORT: true # Explicitly set the environment variable

      - name: Upload and Pin to IPFS via Pinata
        id: deploy_pinata
        uses: anantaramdas/ipfs-pinata-deploy-action@v1.6.4
        with:
          pinata-jwt: ${{ secrets.PINATA_JWT }}
          pin-name: "Promethea-dweb-${{ github.sha }}"
          path-to-deploy: 'out' # This is the folder generated by 'npm run export'
          
      - name: Update DNSLink TXT Record on Cloudflare
        uses: ipfs/dnslink-action@v1
        with:
          cid: ${{ steps.deploy_pinata.outputs.ipfs_hash }}
          dnslink_domain: 'dweb.lvhllc.org'
          cf_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          cf_auth_token: ${{ secrets.CLOUDFLARE_API_TOKEN }} 
          
      - name: Report Success
        run: |
          echo "🎉 IPFS Deployment Complete!"
          echo "🌐 Temporary Gateway Link: https://ipfs.io/ipfs/${{ steps.deploy_pinata.outputs.ipfs_hash }}"
          echo "🔗 Permanent Decentralized Link (may take a few minutes to resolve): https://dweb.lvhllc.org"
