openapi: 3.0.1
info:
  title: Promethea Google Trends MCP
  description: Provides tools for fetching and analyzing Google Trends data to gauge market psychology.
  version: 'v1'
servers:
  - url: http://localhost:8000
paths:
  /tools/get_interest_acceleration:
    post:
      operationId: getInterestAcceleration
      summary: Calculates the acceleration of search interest for a keyword.
      x-google-tool-name: get_interest_acceleration # Matches the function name in code
      description: >
        Fetches the Google Trends interest-over-time data for a specific keyword
        over the last month and calculates the acceleration (second derivative)
        of the trend. This is useful for understanding the rate of change in
        public interest, which is a component of the market psychology vector.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                  description: The search term or keyword to analyze (e.g., 'bitcoin', 'interest rates').
      responses:
        '200':
          description: The calculated acceleration value.
          content:
            application/json:
              schema:
                type: object