# A generic Alembic configuration file.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file

[alembic]
# path to migration scripts
script_location = trading_agent/migrations

# template for migration file names, e.g. "alembic/versions/2023_01_01_12345_add_account_table.py"
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# MODIFICATION: This is the critical fix. Commenting out the timezone
# tells Alembic to safely default to UTC and avoids the ValueError.
# timezone = 

# database connection URL
sqlalchemy.url = postgresql://user:password@localhost:5432/promethea

# ... rest of the file is default configuration ...

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic