version: '3.8'

services:

  # 1. 🌐 Central MCP Gateway (The 'Switchboard')
  # This container securely exposes your services as MCP tools to all agents.
  mcp-gateway:
    image: docker/mcp-gateway:latest # Use the official Docker MCP image
    environment:
      # Inject necessary secrets/tokens (defined in .env)
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # You can configure which servers to expose here, or let agents
      # use the Gateway for internal tool discovery.
    ports:
      - "8080:8080" # Expose the MCP Gateway port for external clients (e.g., Warp, VSCode)
    networks:
      - agent-net
    command: --servers=github,files # Example: exposing GitHub and a File system tool
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allows the gateway to discover and manage containerized MCP servers

  # 2. 🤖 Agent 1: The Core Development Agent (Your main logic)
  agent-core:
    build:
      # CORRECTED CONTEXT: Points to the directory containing Dockerfile and code
      context: ./agents/agents_core 
    volumes:
      # Mount the entire project root into the container's workspace
      - .:/workspace:cached 
    environment:
      # Direct the agent to the MCP Gateway and IPFS service
      - MCP_GATEWAY_URL=http://mcp-gateway:8080
      - IPFS_API_ADDR=http://ipfs:5001
    networks:
      - agent-net
    depends_on:
      - mcp-gateway
      - ipfs
    working_dir: /workspace # Set the workspace as the default directory inside the container

  # 3. 💾 IPFS Service (Decentralized storage tool)
  ipfs:
    image: ipfs/go-ipfs:latest
    ports:
      - "5001:5001" # API port for agents to communicate with
      - "8080:8080" # Gateway (if needed)
    volumes:
      - ipfs_data:/data/ipfs # Persist data
    networks:
      - agent-net

  # 4. 🔥 Firebase Emulators (Backend service tool)
  firebase-emulators:
    image: node:lts-alpine # A lightweight image for Node-based tools
    working_dir: /app
    volumes:
      # Assuming your firebase config files are in a directory named 'firebase_config'
      - ./firebase_config:/app 
    ports:
      - "4000:4000" # Firebase UI
      - "8081:8081" # Auth
      - "8085:8085" # Functions
    networks:
      - agent-net
    command: npm install -g firebase-tools && firebase emulators:start --only auth,firestore,functions --host 0.0.0.0

volumes:
  ipfs_data: # Persist IPFS data

networks:
  agent-net: